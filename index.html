<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>MovieX Free</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  overflow-x:hidden;
}

/* ===== BACKGROUND VIDEO ===== */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter: brightness(0.5);
}

/* ===== WELCOME SCREEN (FIXED GLASS BLACK) ===== */
#welcome{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:rgba(0,0,0,0.35);

  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:9999;
}

#welcome h1{
  font-size:22px;
  margin-bottom:20px;
}

#welcome button{

  padding:14px 40px;

  border:none;

  border-radius:30px;

  background:#ff9800;

  color:black;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;

  box-shadow:
    0 0 20px rgba(255,140,0,0.7);

  transition:0.3s;
}

#welcome button:active{
  transform:scale(0.95);
}
  .welcomeLogo{
  font-size:42px;
  font-weight:bold;

  text-align:center;

  color:white;

  margin-bottom:20px;

  text-shadow:
    0 0 20px rgba(255,140,0,0.8),
    0 0 40px rgba(255,140,0,0.5);

  animation: logoPulse 2s infinite;
}

/* ===== HEADER GLASS ===== */
header{
  display:flex;
  flex-direction:column;

  gap:15px;

  padding:20px;

  width:100%;
  box-sizing:border-box;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(15px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  position:relative;

  font-size:20px;
  font-weight:900;

  letter-spacing:2px;

  padding:12px 20px;

  border-radius:18px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,140,0,0.25);

  color:white;

  overflow:hidden;

  text-shadow:
    0 0 10px rgba(255,140,0,.8),
    0 0 20px rgba(255,140,0,.6);

  box-shadow:
    0 0 20px rgba(255,140,0,.2);

  animation:logoGlow 3s infinite alternate;
  
  text-align:center;
line-height:1.2;
  width:100%;
box-sizing:border-box;
}

input{
  width:100%;
  max-width:500px;

  padding:12px 15px;

  border-radius:30px;

  border:1px solid rgba(255,140,0,0.3);

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(20px);

  color:white;

  outline:none;

  transition:0.3s;
  box-sizing:border-box;
  
}

input::placeholder{
  color:rgba(255,255,255,0.6);
}

input:focus{
  width:260px;

  border-color:rgba(255,140,0,0.8);

  box-shadow:0 0 20px rgba(255,140,0,0.4);
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:20px;
}

/* ===== CARD ===== */
.card{
  background: rgba(255,140,0,0.15);
  border:1px solid rgba(255,140,0,0.3);
  border-radius:10px;
  
  .card{
  background: rgba(255,140,0,0.15);
  border:1px solid rgba(255,140,0,0.3);
  border-radius:10px;

  -webkit-tap-highlight-color: transparent;

  overflow:hidden;
  cursor:pointer;

  opacity:0;
  transform:translateY(20px);
  animation: cardIn 0.5s forwards;

  transition:0.2s;
}
  overflow:hidden;
  cursor:pointer;

  opacity:0;
  transform:translateY(20px);
  animation: cardIn 0.5s forwards;

  transition:0.2s;
}

.card:hover{ transform:scale(1.05); }

.card:active{
  filter:brightness(1.15);
  box-shadow:0 0 15px rgba(255,140,0,0.7);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
}

.title{
  text-align:center;
  padding:8px;
  font-size:13px;
}

/* ===== PLAYER ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  z-index:999;
}

.modal.active{ display:flex; }

video{
  width:90%;
  max-width:800px;
  border-radius:10px;
  
  box-shadow:0 0 30px rgba(255,140,0,0.4);
border:1px solid rgba(255,140,0,0.3);
}

.close{
  margin-top:10px;
  padding:10px 20px;
  background:red;
  border:none;
  color:white;
}

/* ===== ANIMATIONS ===== */
@keyframes cardIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes slideDown{
  from{ transform:translateY(-60px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes logoGlow{

  from{
    box-shadow:0 0 10px rgba(255,140,0,.2);
  }

  to{
    box-shadow:0 0 35px rgba(255,140,0,.7);
  }

}

  @keyframes logoGlow{
  from{
    box-shadow:0 0 15px rgba(255,140,0,0.2);
  }

  to{
    box-shadow:0 0 30px rgba(255,140,0,0.6);
  }
}
  @keyframes logoGlow{

  from{
    box-shadow:0 0 10px rgba(255,140,0,.2);
  }

  to{
    box-shadow:0 0 35px rgba(255,140,0,.7);
  }

}
  @keyframes logoPulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }

}

.fadeOut{
  animation:fadeOut 0.6s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    visibility:hidden;
  }
}
  .playerBtns{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.glassBtn{
  padding:12px 20px;

  border:none;

  border-radius:15px;

  color:white;

  background:rgba(255,140,0,0.15);

  border:1px solid rgba(255,140,0,0.4);

  backdrop-filter:blur(15px);

  box-shadow:0 0 15px rgba(255,140,0,0.3);
}

.glassBtn:active{
  box-shadow:0 0 25px rgba(255,140,0,0.8);
}
.menuBtn{

  width:50px;

  height:50px;

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:24px;

  border-radius:15px;

  background:rgba(255,140,0,0.15);

  border:1px solid rgba(255,140,0,0.3);

  backdrop-filter:blur(15px);

}

#sideMenu{

  position:fixed;

  top:0;

  right:-260px;

  width:250px;

  height:100%;

  background:rgba(255,140,0,0.15);

  backdrop-filter:blur(20px);

  -webkit-backdrop-filter:blur(20px);

  transition:0.3s;

  z-index:9999;

  padding-top:80px;
  border-left:1px solid rgba(255,140,0,0.4);

box-shadow:
  0 0 30px rgba(255,140,0,0.25);

}

#sideMenu.open{
  right:0;
}

.menuTitle{

  text-align:center;

  font-size:20px;

  margin-bottom:20px;

}

.menuItem{

  padding:15px;

  border-bottom:1px solid rgba(255,255,255,0.1);

}
  .searchRow{

  display:flex;

  align-items:center;

  gap:10px;

}

.searchRow input{

  flex:1;

}
  #overlay{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.3);

  backdrop-filter:blur(3px);

  display:none;

  z-index:9998;

}

#overlay.show{
  display:block;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<video autoplay muted loop id="bgVideo">
  <source src="background.mp4" type="video/mp4">
</video>

<!-- WELCOME -->
<div id="welcome">

  <div class="welcomeLogo">
    
    <br>
    MovieX Free
  </div>

  <h1>تنها سایت پورن بدون فیلتر</h1>

  <button onclick="startSite()">
    OK
  </button>

</div>

<!-- HEADER -->
<header>

  <div class="logo">
     MovieX Free
  </div>

  <div class="searchRow">

  <input
   id="search"
   placeholder="جستجوی فیلم..."
   onkeyup="search()"
  >

  <div class="menuBtn" onclick="openMenu()">
    ☰
  </div>

</div>

</header>
  <div id="overlay" onclick="closeMenu()"></div>
  <div id="sideMenu">

  <div class="menuTitle">
    دسته بندی فیلم ها
  </div>

<div class="menuItem" onclick="filterMovies('all')">
  all
</div>

<div class="menuItem" onclick="filterMovies('vagin')">
vagin
</div>

<div class="menuItem" onclick="filterMovies('anal')">
anal
</div>

<div class="menuItem" onclick="filterMovies('oral')">
oral
</div>
 
    
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="modal" id="modal">

  <video id="video" controls></video>

  <div class="playerBtns">

    <button class="glassBtn" onclick="prevMovie()">«</button>

<button class="glassBtn" onclick="downloadMovie()">دانلود</button>

<button class="glassBtn" onclick="closeM()">بستن</button>

<button class="glassBtn" onclick="nextMovie()">»</button>

  </div>

</div>

<script>

/* ===== 30 FILMS ===== */
const movies = [
  {title:"فیلم 1", category:"vagin",img:"a1.jpg", src:"v1.mp4"},
  {title:"فیلم 2", category:"vagin",img:"a2.jpg", src:"v2.mp4"},
  {title:"فیلم 3", img:"a3.jpg", src:"v3.mp4"},
  {title:"فیلم 4", category:"anal",img:"a4.jpg", src:"v4.mp4"},
  {title:"فیلم 5", category:"oral",img:"a5.jpg", src:"v5.mp4"},
  {title:"فیلم 6", category:"vagin",img:"a6.jpg", src:"v6.mp4"},
  {title:"فیلم 7", category:"oral",img:"a7.jpg", src:"v7.mp4"},
  {title:"فیلم 8", category:"vagin",img:"a8.jpg", src:"v8.mp4"},
  {title:"فیلم 9", img:"a9.jpg", src:"v9.mp4"},
  {title:"فیلم 10", img:"a10.jpg", src:"v10.mp4"},
  {title:"فیلم 11", category:"anal",img:"a11.jpg", src:"v11.mp4"},
  {title:"فیلم 12", img:"a12.jpg", src:"v12.mp4"},
  {title:"فیلم 13", category:"vagin",img:"a13.jpg", src:"v13.mp4"},
  {title:"فیلم 14", img:"a14.jpg", src:"v14.mp4"},
  {title:"فیلم 15", category:"vagin",img:"a15.jpg", src:"v15.mp4"},
  {title:"فیلم 16", category:"anal",img:"a16.jpg", src:"v16.mp4"},
  {title:"فیلم 17", category:"oral",img:"a17.jpg", src:"v17.mp4"},
  {title:"فیلم 18", img:"a18.jpg", src:"v18.mp4"},
  {title:"فیلم 19", category:"oral",img:"a19.jpg", src:"v19.mp4"},
  {title:"فیلم 20", category:"anal",img:"a20.jpg", src:"v20.mp4"},
  {title:"فیلم 21", img:"a21.jpg", src:"v21.mp4"},
  {title:"فیلم 22", category:"oral",img:"a22.jpg", src:"v22.mp4"},
  {title:"فیلم 23", category:"anal",img:"a23.jpg", src:"v23.mp4"},
  {title:"فیلم 24", img:"a24.jpg", src:"v24.mp4"},
  {title:"فیلم 25", img:"a25.jpg", src:"v25.mp4"},
  {title:"فیلم 26", img:"a26.jpg", src:"v26.mp4"},
  {title:"فیلم 27", img:"a27.jpg", src:"v27.mp4"},
  {title:"فیلم 28", img:"a28.jpg", src:"v28.mp4"},
  {title:"فیلم 29", img:"a29.jpg", src:"v29.mp4"},
  {title:"فیلم 30", img:"a30.jpg", src:"v30.mp4"},
];
  
  let currentMovie = 0;

/* START */
function startSite(){

  let w = document.getElementById("welcome");

  w.classList.add("fadeOut");

  setTimeout(()=>{
    w.style.display="none";
    render();
  },600);

}

/* RENDER */
function render(list=movies){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  list.forEach((m,i)=>{
    grid.innerHTML += `
      <div class="card" style="animation-delay:${i*0.03}s" onclick="play('${m.src}')">
        <img src="${m.img}">
        <div class="title">${m.title}</div>
      </div>
    `;
  });
}

/* SEARCH */
function search(){
  let val=document.getElementById("search").value.toLowerCase();
  let filtered=movies.filter(m=>m.title.toLowerCase().includes(val));
  render(filtered);
}

/* PLAY */
function play(src){
  const modal=document.getElementById("modal");
  const video=document.getElementById("video");

  currentMovie = movies.findIndex(m => m.src === src);
  
  modal.classList.add("active");
  video.src=src;
  video.play();
}

/* CLOSE */
function closeM(){
  const modal=document.getElementById("modal");
  const video=document.getElementById("video");

  modal.classList.remove("active");
  video.pause();
  video.src="";
}
document.addEventListener("touchstart", function(e){

  const card = e.target.closest(".card");

  if(card){
    card.style.scale = "1.02";
card.style.boxShadow = "0 0 15px rgba(255,140,0,0.5)";
  }

});

document.addEventListener("touchend", function(){

  document.querySelectorAll(".card").forEach(card=>{
    card.style.scale = "1";
card.style.boxShadow = "none";
  });

});
  function nextMovie(){

  currentMovie++;

  if(currentMovie >= movies.length){
    currentMovie = 0;
  }

  play(movies[currentMovie].src);

}

function prevMovie(){

  currentMovie--;

  if(currentMovie < 0){
    currentMovie = movies.length - 1;
  }

  play(movies[currentMovie].src);

}
  function downloadMovie(){

  const a = document.createElement("a");

  a.href = movies[currentMovie].src;

  a.download = "";

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

}
  function openMenu(){

  document
    .getElementById("sideMenu")
    .classList
    .add("open");

  document
    .getElementById("overlay")
    .classList
    .add("show");

}
  function closeMenu(){

  document
    .getElementById("sideMenu")
    .classList
    .remove("open");

  document
    .getElementById("overlay")
    .classList
    .remove("show");

}
  function filterMovies(category){

  closeMenu();

  if(category === "all"){
    render(movies);
    return;
  }

  let filtered =
    movies.filter(movie =>
      movie.category === category
    );

  render(filtered);

}
</script>

</body>
</html>
